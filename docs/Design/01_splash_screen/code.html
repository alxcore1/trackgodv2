<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary">
<!-- SPLASH SCREEN CANVAS -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center overflow-hidden metal-texture bg-surface-container-lowest">
<!-- Background Scratches & Texture Overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none" data-alt="Subtle metallic scratches and dark industrial texture">

</div>

<div class="z-10 flex flex-col items-center text-center px-6">

<p class="font-headline tracking-[0.5em] text-secondary-fixed-dim opacity-60 mb-8 text-sm md:text-base font-black" style="">
                RAGE. RIP. REPEAT.
            </p>
<!-- Branding Core -->
<div class="relative group cursor-pointer">
<!-- Large Aggressive 'TG' Logo (Simplified Representative Shape) -->
<div class="flex flex-col items-center">
<div class="font-headline font-black text-9xl md:text-[12rem] leading-none italic tracking-tighter text-primary-container glow-red flex select-none">
<span class="" style="">T</span><span class="-ml-8 md:-ml-12" style="">G</span>
</div>
<!-- Main Wordmark -->
<h1 class="font-headline font-black text-5xl md:text-7xl uppercase tracking-tighter text-primary-container -mt-4 md:-mt-8 scale-y-110 italic" style="">
                        TRACKGOD
                    </h1>
</div>

<div class="absolute -inset-10 bg-primary-container/10 blur-[60px] rounded-full -z-10 group-hover:bg-primary-container/20 transition-all duration-300"></div>
</div>
<!-- Contextual Altar Meta -->
<div class="mt-12 border-l-2 border-primary-container pl-4 text-left">
<p class="font-headline font-bold text-xs tracking-widest text-on-surface-variant uppercase" style="">SYSTEM_INIT</p>
<p class="font-headline font-black text-xl text-on-surface uppercase italic" style="">LOADING</p>
</div>
</div>
<!-- Action Area (Bottom) -->
<div class="absolute bottom-16 w-full flex flex-col items-center gap-6 px-6">
<!-- High Impact CTA -->
<button class="group relative flex items-center justify-center py-4 px-12 bg-primary-container text-on-primary font-headline font-black text-xl uppercase tracking-widest transition-transform active:scale-95 duration-100 overflow-hidden" style="">

<div class="absolute inset-0 opacity-20 pointer-events-none bg-[url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&amp;w=1000&amp;auto=format&amp;fit=crop')] bg-cover"></div>

                    TAP TO ENTER THE ALTAR
                    <span class="material-symbols-outlined text-2xl group-hover:translate-x-2 transition-transform" style="">keyboard_double_arrow_right</span>
</span>
<!-- Inner Bevel Simulation -->
<div class="absolute inset-0 border-[1px] border-primary/30 pointer-events-none"></div>
</button>

<div class="flex items-center gap-8 font-headline font-bold text-[10px] tracking-[0.3em] text-secondary-fixed-dim/40 uppercase">
<span class="" style="">VER: 6.6.6</span>
<span class="h-1 w-1 bg-primary-container rounded-full"></span>
<span class="" style="">SECURE ACCESS ONLY</span>
</div>
</div>
